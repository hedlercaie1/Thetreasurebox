<!DOCTYPE html>
<html>
<head>
    <title>The Treasure Box</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("container");
            container.appendChild(player);
            
            // Troque 'seu-arquivo.swf' pelo nome real do seu arquivo
            player.load("1st.swf");
            
            // Ajusta o tamanho para preencher a tela
            player.style.width = "100%";
            player.style.height = "100%";
        });
    </script>
</body>

</html>
